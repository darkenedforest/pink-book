<style>

.controls-row1{max-width:720px;margin:0.3rem auto 0;padding:0 1rem;display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center;}

ruby rt{font-size:0.5em;color:var(--hira-color);font-family:'Noto Sans JP',sans-serif;font-weight:400;}body.hide-furigana ruby rt{visibility:hidden;}

.popup .grammar-tag{display:inline-block;font-family:'Source Sans Pro',sans-serif;font-size:0.62rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#fff;background:var(--grammar-color);padding:0.12rem 0.5rem;border-radius:999px;margin-bottom:0.35rem;}
.popup .grammar-explain{font-family:'Source Sans Pro','Noto Sans SC','Noto Sans KR','Noto Sans Myanmar','Noto Sans Devanagari',sans-serif;font-size:0.8rem;color:var(--text);line-height:1.55;margin-top:0.25rem;}

<script>

const UI={trans_btn:{en:'Translation',zh:'翻译',ko:'번역',my:'ဘာသာပြန်',vi:'Dịch',ne:'अनुवाद'},leg_vocab:{en:'Vocabulary',zh:'词汇',ko:'어휘',my:'ဝေါဟာရ',vi:'Từ vựng',ne:'शब्दावली'},leg_grammar:{en:'Grammar',zh:'语法',ko:'문법',my:'သဒ္ဒါ',vi:'Ngữ pháp',ne:'व्याकरण'},grammar_tag:{en:'Grammar Point',zh:'语法点',ko:'문법 포인트',my:'သဒ္ဒါအချက်',vi:'Điểm ngữ pháp',ne:'व्याकरण बिन्दु'}};
let curLang='en';let showHira=true,showTrans=true,showFurigana=true;
function m(en,zh,ko,my,vi,ne){return{en,zh,ko,my,vi,ne};}function W(s,r,meaning){return{w:s,r:r,m:meaning};}function G(s,r,meaning,explain){return{g:s,r:r,m:meaning,x:explain};}function P(t){return{p:t};}function L(d){return(typeof d==='object'&&d[curLang])?d[curLang]:(typeof d==='string'?d:(d.en||''));}

const sentences=[
// ---- S1 ----
{
  parts:[
    W("最近","さいきん",m("recently","最近","최근","မကြာသေးမီက","gần đây","हालसालै")),
    P("、"),
    W("地球","ちきゅう",m("the earth","地球","지구","ကမ္ဘာ","trái đất","पृथ्वी")),
    P("の"),
    W("温暖化","おんだんか",m("warming","变暖","온난화","ပူနွေးလာခြင်း","sự nóng lên","तापक्रम वृद्धि")),
    P("や"),
    W("砂漠化","さばくか",m("desertification","沙漠化","사막화","သဲကန္တာရဖြစ်လာခြင်း","sa mạc hóa","मरुभूमिकरण")),
    P("が"),
    W("問題","もんだい",m("problem","问题","문제","ပြဿနာ","vấn đề","समस्या")),
    P("になってきている。"),
  ],
  hira:"さいきん、 ちきゅう の おんだんか や さばくか が もんだい に なってきている。",
  trans:m("Recently, global warming and desertification have been becoming problems.","最近，地球变暖和沙漠化逐渐成为问题。","최근, 지구의 온난화와 사막화가 문제가 되어 오고 있다.","မကြာသေးမီက ကမ္ဘာ့ပူနွေးလာခြင်းနှင့် သဲကန္တာရဖြစ်လာခြင်းသည် ပြဿနာဖြစ်လာနေသည်။","Gần đây, sự nóng lên toàn cầu và sa mạc hóa đang trở thành vấn đề.","हालसालै, पृथ्वीको तापक्रम वृद्धि र मरुभूमिकरण समस्या बन्दै आएको छ।")
},
// ---- S2 ----
{
  parts:[
    W("それで","それで",m("so, because of that","因此","그래서","ဒါကြောင့်","vì vậy","त्यसैले")),
    P("、"),
    W("自分たち","じぶんたち",m("ourselves","自己们","자신들","ကိုယ့်ဘာသာ","chúng ta","हामी")),
    P("が"),
    W("住む","すむ",m("to live in","住","사는","နေထိုင်သည်","sống","बस्नु")),
    W("地球","ちきゅう",m("the earth","地球","지구","ကမ္ဘာ","trái đất","पृथ्वी")),
    P("を"),
    W("守ろう","まもろう",m("let's protect (volitional)","保护吧","지키자","ကာကွယ်ကြစို့","hãy bảo vệ","जोगाऔं")),
    P("という"),
    W("意識","いしき",m("awareness, consciousness","意识","의식","သတိ","ý thức","चेतना")),
    P("が"),
    W("生まれている","うまれている",m("is being born, is developing","正在产生","생겨나고 있다","ပေါ်ပေါက်နေသည်","đang nảy sinh","जन्मिएको छ")),
    P("。"),
  ],
  hira:"それで、 じぶんたち が すむ ちきゅう を まもろう と いう いしき が うまれている。",
  trans:m("So, an awareness of 'let's protect the earth we live on' is developing.","因此，保护我们居住的地球的意识正在产生。","그래서, 자신들이 사는 지구를 지키자는 의식이 생겨나고 있다.","ဒါကြောင့် ကိုယ်နေထိုင်တဲ့ ကမ္ဘာကို ကာကွယ်ကြစို့ဆိုတဲ့ သတိ ပေါ်ပေါက်နေသည်။","Vì vậy, ý thức 'hãy bảo vệ trái đất nơi chúng ta sống' đang hình thành.","त्यसैले, हामी बस्ने पृथ्वीलाई जोगाऔं भन्ने चेतना जन्मिएको छ।")
},
// ---- S3 ----
{
  parts:[
    W("以前","いぜん",m("in the past","以前","이전에는","ယခင်","trước đây","पहिले")),
    P("は"),
    W("古くなったり","ふるくなったり",m("become old (and)","变旧","오래되거나","ဟောင်းလာခြင်း","trở nên cũ","पुरानो भएर")),
    P("、"),
    W("壊れたりした","こわれたりした",m("break (among other things)","坏掉等","고장나거나 한","ပျက်စီးခြင်း","bị hỏng","भाँचिएर")),
    W("物","もの",m("thing","东西","물건","အရာ","đồ vật","सामान")),
    P("は"),
    W("すぐ","すぐ",m("immediately","马上","바로","ချက်ချင်း","ngay lập tức","तुरुन्तै")),
    G("捨てたものだ","すてたものだ",
      m("used to throw away","过去常常扔掉","버리곤 했다","စွန့်ပစ်တတ်ခဲ့သည်","thường vứt đi","फालिदिन्थ्यो"),
      m("Vタものだ (L7) — Expresses nostalgia or recollection of how things used to be. Here: 'People used to just throw things away.' Reflects on past habits with a sense of 'that's how it was.'",
        "Vタものだ（第7课）— 表达对过去情况的怀念或回忆。此处：'过去人们总是把东西扔掉。'带有'当时就是那样'的感慨。",
        "Vタものだ (7과) — 과거 상황에 대한 회상을 나타냅니다. '예전에는 바로 버리곤 했다.' '그때는 그랬다'는 뉘앙스.",
        "Vタものだ (သင်ခန်းစာ 7) — အတိတ်တွင် ဖြစ်ပျက်ခဲ့ပုံကို ပြန်လည်အမှတ်ရခြင်း။",
        "Vタものだ (Bài 7) — Diễn tả sự hồi tưởng về quá khứ. 'Ngày xưa người ta thường vứt đi ngay.'",
        "Vタものだ (पाठ 7) — बितेका दिनको सम्झना व्यक्त गर्छ। 'पहिले मानिसहरू तुरुन्तै फालिदिन्थ्यो।'")),
    P("。"),
  ],
  hira:"いぜん は ふるくなったり、 こわれたりした もの は すぐ すてた ものだ。",
  trans:m("In the past, things that got old or broke would be thrown away immediately.","以前，变旧或坏掉的东西会马上被扔掉。","이전에는 오래되거나 고장 나거나 한 물건은 바로 버리곤 했다.","ယခင်က ဟောင်းသွားတာ ပျက်သွားတာတွေကို ချက်ချင်း စွန့်ပစ်တတ်ခဲ့သည်။","Trước đây, đồ vật cũ hay hỏng đều bị vứt đi ngay.","पहिले, पुरानो भएका वा भाँचिएका सामानहरू तुरुन्तै फालिदिन्थ्यो।")
},
// ---- S4 ----
{
  parts:[
    W("しかし","しかし",m("however","但是","하지만","သို့သော်","tuy nhiên","तथापि")),
    P("、"),
    W("今","いま",m("now","现在","지금","ယခု","bây giờ","अहिले")),
    P("は"),
    W("できるだけ","できるだけ",m("as much as possible","尽量","될 수 있는 한","တတ်နိုင်သမျှ","càng ~ càng tốt","सकेसम्म")),
    W("大切に","たいせつに",m("carefully, with care","珍惜地","소중히","ဂရုတစိုက်","cẩn thận","ध्यानपूर्वक")),

    P("という"),
    W("考え","かんがえ",m("thought, idea","想法","생각","အတွေးအခေါ်","suy nghĩ","विचार")),
    P("に"),
    W("変わってきた","かわってきた",m("has been changing to","逐渐改变了","바뀌어 왔다","ပြောင်းလဲလာခဲ့သည်","đã thay đổi sang","परिवर्तन भएको छ")),
    P("。"),
  ],
  hira:"しかし、 いま は できるだけ たいせつ に つかおう と いう かんがえ に かわってきた。",
  trans:m("However, the thinking has changed to 'let's use things as carefully as possible.'","但是，人们的想法已逐渐变成尽量珍惜使用。","하지만, 지금은 될 수 있는 한 소중히 쓰자는 생각으로 바뀌어 왔다.","သို့သော် ယခုအခါ တတ်နိုင်သမျှ ဂရုတစိုက် သုံးကြစို့ဆိုတဲ့ အတွေးအခေါ်သို့ ပြောင်းလဲလာခဲ့သည်။","Tuy nhiên, suy nghĩ đã thay đổi sang 'hãy sử dụng cẩn thận nhất có thể.'","तथापि, अहिले सकेसम्म ध्यानपूर्वक प्रयोग गरौं भन्ने विचारमा परिवर्तन भएको छ।")
},
// ---- S5 ----
{

function rubyHTML(s,r){if(/^[\u3040-\u309F\u30A0-\u30FFー\uFF01-\uFF5E「」（）]+$/.test(s))return s;return`<ruby>${s}<rt>${r}</rt></ruby>`;}
function renderPassage(){const el=document.getElementById('passage');el.innerHTML='';sentences.forEach((s,si)=>{const block=document.createElement('div');block.className='sentence-block';const jpLine=document.createElement('span');jpLine.className='jp-sentence';s.parts.forEach(part=>{if(part.w){const span=document.createElement('span');span.className='word';span.innerHTML=rubyHTML(part.w,part.r);span.onclick=e=>showPopup(e,{type:'word',reading:part.r,word:part.w,meaning:L(part.m)});jpLine.appendChild(span);}else if(part.g){const span=document.createElement('span');span.className='grammar';span.innerHTML=rubyHTML(part.g,part.r);span.onclick=e=>showPopup(e,{type:'grammar',reading:part.r,word:part.g,meaning:L(part.m),explain:L(part.x)});jpLine.appendChild(span);}else if(part.p!==undefined){const span=document.createElement('span');span.innerHTML=part.p;jpLine.appendChild(span);}});block.appendChild(jpLine);const hiraLine=document.createElement('span');hiraLine.className='hira-line'+(showHira?'':' hidden');hiraLine.textContent=s.hira;block.appendChild(hiraLine);const transLine=document.createElement('span');transLine.className='trans-line'+(showTrans?'':' hidden');transLine.textContent=L(s.trans);block.appendChild(transLine);el.appendChild(block);if(si===3){const br=document.createElement('div');br.className='para-break';el.appendChild(br);}});}
function renderLangPicker(){const sel=document.getElementById('langPicker');sel.innerHTML='';LANGS.forEach(code=>{const opt=document.createElement('option');opt.value=code;opt.textContent=LANG_LABELS[code];if(code===curLang)opt.selected=true;sel.appendChild(opt);});}
function setLang(code){curLang=code;updateAll();}function updateUI(){document.querySelectorAll('[data-ui]').forEach(el=>{const key=el.getAttribute('data-ui');if(UI[key])el.textContent=L(UI[key]);});}function updateAll(){renderLangPicker();updateUI();renderPassage();}
function showPopup(e,data){e.stopPropagation();const popup=document.getElementById('popup');const overlay=document.getElementById('popupOverlay');let html='';if(data.type==='grammar'){html+=`<div class="grammar-tag">${L(UI.grammar_tag)}</div>`;html+=`<div class="reading">${data.reading}</div>`;if(data.word!==data.reading)html+=`<div class="kanji-display">${data.word}</div>`;html+=`<div class="meaning"><strong>${data.meaning}</strong></div>`;html+=`<div class="grammar-explain">${data.explain}</div>`;}else{html+=`<div class="reading">${data.reading}</div>`;if(data.word!==data.reading)html+=`<div class="kanji-display">${data.word}</div>`;html+=`<div class="meaning">${data.meaning}</div>`;}popup.innerHTML=html;popup.classList.add('show');overlay.classList.add('show');const rect=e.currentTarget.getBoundingClientRect();const popW=Math.min(340,window.innerWidth-20);let left=rect.left+rect.width/2-popW/2;if(left<10)left=10;if(left+popW>window.innerWidth-10)left=window.innerWidth-popW-10;let top=rect.bottom+10;popup.style.transform='none';if(top+220>window.innerHeight){top=rect.top-10;popup.style.transform='translateY(-100%)';}popup.style.left=left+'px';popup.style.top=top+'px';popup.style.width=popW+'px';}
function closePopup(){document.getElementById('popup').classList.remove('show');document.getElementById('popupOverlay').classList.remove('show');}
function toggleFurigana(){showFurigana=!showFurigana;document.body.classList.toggle('hide-furigana',!showFurigana);document.getElementById('btnFurigana').classList.toggle('active',showFurigana);}
function toggleHira(){showHira=!showHira;document.getElementById('btnHira').classList.toggle('active',showHira);document.querySelectorAll('.hira-line').forEach(el=>el.classList.toggle('hidden',!showHira));}
function toggleTrans(){showTrans=!showTrans;document.getElementById('btnTrans').classList.toggle('active',showTrans);document.querySelectorAll('.trans-line').forEach(el=>el.classList.toggle('hidden',!showTrans));}
function setFontSize(val){document.documentElement.style.setProperty('--font-size',val+'px');}function toggleToolbar(){document.getElementById('toolbar').classList.toggle('collapsed');}
window.addEventListener('scroll',()=>{document.getElementById('toolbar').classList.toggle('scrolled',window.scrollY>5);},{passive:true});
updateAll();
</script>
</body>
</html>
