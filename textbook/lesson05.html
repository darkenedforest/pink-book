<script>
const LANGS=['en','zh','ko','my','vi','ne'];const LANG_LABELS={en:'English',zh:'中文',ko:'한국어',my:'မြန်မာ',vi:'Tiếng Việt',ne:'नेपाली'};const UI={trans_btn:{en:'Translation',zh:'翻译',ko:'번역',my:'ဘာသာပြန်',vi:'Dịch',ne:'अनुवाद'},leg_vocab:{en:'Vocabulary',zh:'词汇',ko:'어휘',my:'ဝေါဟာရ',vi:'Từ vựng',ne:'शब्दावली'},leg_grammar:{en:'Grammar',zh:'语法',ko:'문법',my:'သဒ္ဒါ',vi:'Ngữ pháp',ne:'व्याकरण'},grammar_tag:{en:'Grammar Point',zh:'语法点',ko:'문법 포인트',my:'သဒ္ဒါအချက်',vi:'Điểm ngữ pháp',ne:'व्याकरण बिन्दु'}};let curLang='en';let showHira=true,showTrans=true,showFurigana=true;
function m(en,zh,ko,my,vi,ne){return{en,zh,ko,my,vi,ne};}function W(s,r,mg){return{w:s,r:r,m:mg};}function G(s,r,mg,x){return{g:s,r:r,m:mg,x:x};}function P(t){return{p:t};}function L(d){return(typeof d==='object'&&d[curLang])?d[curLang]:(typeof d==='string'?d:(d.en||''));}

const sentences=[
// ---- S1 ----
{
  parts:[
    W("あなた","あなた",m("you","你","당신","သင်","bạn","तपाईं")),
    P("は"),
    W("毎晩","まいばん",m("every night","每晚","매일 밤","ညတိုင်း","mỗi tối","हरेक राति")),
    W("よく","よく",m("well","好好地","잘","ကောင်းကောင်း","tốt","राम्ररी")),
    W("寝られます","ねられます",m("can sleep (potential)","能睡","잘 수 있습니다","အိပ်နိုင်သည်","có thể ngủ","सुत्न सक्नुहुन्छ")),
    P("か。"),
  ],
  hira:"あなた は まいばん よく ねられます か。",
  trans:m("Can you sleep well every night?","你每晚都能睡好吗？","당신은 매일 밤 잘 잘 수 있습니까?","သင် ညတိုင်း ကောင်းကောင်း အိပ်နိုင်ပါသလား။","Bạn có ngủ ngon mỗi tối không?","तपाईं हरेक राति राम्ररी सुत्न सक्नुहुन्छ?")
},
// ---- S2 ----
{
  parts:[
    W("夜","よる",m("at night","夜里","밤에","ညဘက်","ban đêm","रात")),
    W("なかなか","なかなか",m("not easily","怎么也","좀처럼","လွယ်လွယ်နဲ့ မ~","khó mà","सजिलै")),
    W("寝られなかったり","ねられなかったり",m("not being able to sleep (among other things)","睡不着","잠들지 못하거나","မအိပ်နိုင်တာ","không ngủ được","सुत्न नसकेर")),
    P("、"),
    W("夜中","よなか",m("middle of the night","半夜","한밤중","သန်းခေါင်","nửa đêm","मध्यरात")),
    P("に"),
    W("何回","なんかい",m("many times","好几次","몇 번","အကြိမ်ကြိမ်","nhiều lần","कति पटक")),
    P("も"),
    W("目が覚めたり","めがさめたり",m("waking up (among other things)","醒来","잠이 깨거나","နိုးတာ","thức giấc","बिउँझेर")),
    P("して、"),
    W("医者","いしゃ",m("doctor","医生","의사","ဆရာဝန်","bác sĩ","डाक्टर")),
    P("に"),
    W("相談する","そうだんする",m("to consult","咨询","상담하다","တိုင်ပင်","tư vấn","सल्लाह लिने")),
    W("人","ひと",m("person","人","사람","လူ","người","मानिस")),
    P("が"),
    W("多くなっています","おおくなっています",m("has been increasing","变多了","많아지고 있습니다","များလာနေသည်","đang tăng lên","बढ्दै गइरहेको छ")),
    P("。"),
  ],
  hira:"よる なかなか ねられなかったり、 よなか に なんかい も めがさめたり して、 いしゃ に そうだんする ひと が おおくなっています。",
  trans:m("More and more people are consulting doctors because they can't fall asleep easily at night, or they wake up many times in the middle of the night.","因为晚上怎么也睡不着，或者半夜多次醒来，去看医生的人越来越多了。","밤에 좀처럼 잠들지 못하거나, 한밤중에 몇 번이나 깨거나 해서 의사에게 상담하는 사람이 많아지고 있습니다.","ညဘက် လွယ်လွယ်နဲ့ မအိပ်နိုင်တာ၊ သန်းခေါင်မှာ အကြိမ်ကြိမ် နိုးတာတွေကြောင့် ဆရာဝန်နဲ့ တိုင်ပင်သူ များလာနေသည်။","Ngày càng nhiều người tư vấn bác sĩ vì ban đêm khó ngủ, hoặc nửa đêm thức giấc nhiều lần.","रातमा सजिलै सुत्न नसकेर, वा मध्यरातमा कतिपटक बिउँझेर, डाक्टरसँग सल्लाह लिने मानिसहरू बढ्दै गइरहेको छ।")
},
// ---- S3 ----
{
  parts:[
    W("また","また",m("also, furthermore","另外","또한","ထို့အပြင်","ngoài ra","साथै")),
    P("、"),
    W("夜","よる",m("night","晚上","밤","ည","đêm","रात")),
    W("遅く","おそく",m("late","晚","늦게","နောက်ကျ","muộn","ढिलो")),
    P("まで"),
    W("活動する","かつどうする",m("to be active","活动","활동하다","လှုပ်ရှားသည်","hoạt động","क्रियाकलाप गर्ने")),
    P("ことや、"),
    W("通勤","つうきん",m("commuting","通勤","통근","အလုပ်သွားခြင်း","đi làm","कार्यालय आउजाउ")),
    W("時間","じかん",m("time","时间","시간","အချိန်","thời gian","समय")),
    P("の"),
    G("長さ","ながさ",
      m("length","长度","길이","ရှည်ခြင်း","độ dài","लम्बाइ"),
      m("Aさ (L5) — Nominalizes an i-adjective by replacing い with さ. Here: 長い (long) → 長さ (length). The DURATION of the commute is treated as a noun — it becomes one of the CAUSES of sleep problems.",
        "Aさ（第5课）— 将い形容词的い替换为さ，使其名词化。此处：長い（长的）→ 長さ（长度）。通勤的时长被名词化，成为睡眠问题的原因之一。",
        "Aさ (5과) — い형용사의 い를 さ로 바꿔 명사화합니다. 여기서는 長い(긴) → 長さ(길이). 통근 시간의 길이가 수면 문제의 원인 중 하나로 다루어집니다.",
        "Aさ (သင်ခန်းစာ 5) — い နာမဝိသေသနကို さ ဖြင့် အစားထိုး၍ နာမ်အဖြစ် ပြောင်းသည်။ 長い (ရှည်သော) → 長さ (အရှည်)။",
        "Aさ (Bài 5) — Danh từ hóa tính từ đuôi い bằng cách thay い thành さ. Ở đây: 長い (dài) → 長さ (độ dài).",
        "Aさ (पाठ 5) — い विशेषणलाई い को सट्टा さ राखेर नाम बनाउँछ। यहाँ: 長い (लामो) → 長さ (लम्बाइ)।")),
    P("などが"),
    W("原因","げんいん",m("cause","原因","원인","အကြောင်းရင်း","nguyên nhân","कारण")),
    P("で"),
    W("睡眠","すいみん",m("sleep","睡眠","수면","အိပ်စက်ခြင်း","giấc ngủ","निद्रा")),
    W("時間","じかん",m("time, hours","时间","시간","အချိန်","thời gian","समय")),
    P("が"),
    G("減少し","げんしょうし",
      m("decreased (and)","减少","감소하여","လျော့ကျပြီး","giảm","घट्यो (र)"),
      m("連用中止 (L5) — The conjunctive stem form. Instead of 減少して, the stem 減少し connects two clauses in a formal/written style. Here: sleep hours DECREASE, AND people complain about poor health — two related facts presented together.",
        "連用中止（第5课）— 连用中止形。不用減少して，而用词干減少し来连接两个句子，属于正式/书面风格。此处：睡眠时间减少，而且身体不适的人也在增加。",
        "連用中止 (5과) — 연용중지형. 減少して 대신 어간 減少し로 두 절을 연결하는 격식체/문어체 표현. 수면 시간이 줄어들고, 건강 이상을 호소하는 사람도 늘고 있습니다.",
        "連用中止 (သင်ခန်းစာ 5) — ကြိယာပင်မပုံစံဖြင့် ဆက်စပ်ခြင်း။ して မသုံးဘဲ し ဖြင့် ဝါကျနှစ်ခုကို ချိတ်ဆက်သည်။",
        "連用中止 (Bài 5) — Dạng nối liên dụng. Thay vì 減少して, dùng thân 減少し để nối hai mệnh đề theo văn viết.",
        "連用中止 (पाठ 5) — क्रियाको संयोजक रूप। 減少して को सट्टा 減少し प्रयोग गरेर दुई वाक्यांशलाई औपचारिक शैलीमा जोड्छ।")),
    P("、"),
    W("体","からだ",m("body","身体","몸","ခန္ဓာကိုယ်","cơ thể","शरीर")),
    P("の"),
    W("不調","ふちょう",m("poor condition, ill health","不适","부조","ကျန်းမာရေးချို့ယွင်းခြင်း","không khỏe","अस्वस्थता")),
    P("を"),
    W("訴える","うったえる",m("to complain of","诉说","호소하다","တိုင်ကြားသည်","than phiền","गुनासो गर्ने")),
    W("人","ひと",m("person","人","사람","လူ","người","मानिस")),
    P("も"),
    W("増えています","ふえています",m("is increasing","也在增加","늘고 있습니다","တိုးပွားနေသည်","đang tăng","बढ्दैछ")),

function rubyHTML(s,r){if(/^[\u3040-\u309F\u30A0-\u30FFー\uFF01-\uFF5E「」（）]+$/.test(s))return s;return`<ruby>${s}<rt>${r}</rt></ruby>`;}
function renderPassage(){const el=document.getElementById('passage');el.innerHTML='';sentences.forEach((s,si)=>{const block=document.createElement('div');block.className='sentence-block';const jpLine=document.createElement('span');jpLine.className='jp-sentence';s.parts.forEach(part=>{if(part.w){const span=document.createElement('span');span.className='word';span.innerHTML=rubyHTML(part.w,part.r);span.onclick=e=>showPopup(e,{type:'word',reading:part.r,word:part.w,meaning:L(part.m)});jpLine.appendChild(span);}else if(part.g){const span=document.createElement('span');span.className='grammar';span.innerHTML=rubyHTML(part.g,part.r);span.onclick=e=>showPopup(e,{type:'grammar',reading:part.r,word:part.g,meaning:L(part.m),explain:L(part.x)});jpLine.appendChild(span);}else if(part.p!==undefined){const span=document.createElement('span');span.innerHTML=part.p;jpLine.appendChild(span);}});block.appendChild(jpLine);const hiraLine=document.createElement('span');hiraLine.className='hira-line'+(showHira?'':' hidden');hiraLine.textContent=s.hira;block.appendChild(hiraLine);const transLine=document.createElement('span');transLine.className='trans-line'+(showTrans?'':' hidden');transLine.textContent=L(s.trans);block.appendChild(transLine);el.appendChild(block);if(si===2){const br=document.createElement('div');br.className='para-break';el.appendChild(br);}});}
function renderLangPicker(){const sel=document.getElementById('langPicker');sel.innerHTML='';LANGS.forEach(code=>{const opt=document.createElement('option');opt.value=code;opt.textContent=LANG_LABELS[code];if(code===curLang)opt.selected=true;sel.appendChild(opt);});}
function setLang(code){curLang=code;updateAll();}function updateUI(){document.querySelectorAll('[data-ui]').forEach(el=>{const key=el.getAttribute('data-ui');if(UI[key])el.textContent=L(UI[key]);});}function updateAll(){renderLangPicker();updateUI();renderPassage();}
function showPopup(e,data){e.stopPropagation();const popup=document.getElementById('popup');const overlay=document.getElementById('popupOverlay');let html='';if(data.type==='grammar'){html+=`<div class="grammar-tag">${L(UI.grammar_tag)}</div>`;html+=`<div class="reading">${data.reading}</div>`;if(data.word!==data.reading)html+=`<div class="kanji-display">${data.word}</div>`;html+=`<div class="meaning"><strong>${data.meaning}</strong></div>`;html+=`<div class="grammar-explain">${data.explain}</div>`;}else{html+=`<div class="reading">${data.reading}</div>`;if(data.word!==data.reading)html+=`<div class="kanji-display">${data.word}</div>`;html+=`<div class="meaning">${data.meaning}</div>`;}popup.innerHTML=html;popup.classList.add('show');overlay.classList.add('show');const rect=e.currentTarget.getBoundingClientRect();const popW=Math.min(340,window.innerWidth-20);let left=rect.left+rect.width/2-popW/2;if(left<10)left=10;if(left+popW>window.innerWidth-10)left=window.innerWidth-popW-10;let top=rect.bottom+10;popup.style.transform='none';if(top+220>window.innerHeight){top=rect.top-10;popup.style.transform='translateY(-100%)';}popup.style.left=left+'px';popup.style.top=top+'px';popup.style.width=popW+'px';}
function closePopup(){document.getElementById('popup').classList.remove('show');document.getElementById('popupOverlay').classList.remove('show');}
function toggleFurigana(){showFurigana=!showFurigana;document.body.classList.toggle('hide-furigana',!showFurigana);document.getElementById('btnFurigana').classList.toggle('active',showFurigana);}
function toggleHira(){showHira=!showHira;document.getElementById('btnHira').classList.toggle('active',showHira);document.querySelectorAll('.hira-line').forEach(el=>el.classList.toggle('hidden',!showHira));}
function toggleTrans(){showTrans=!showTrans;document.getElementById('btnTrans').classList.toggle('active',showTrans);document.querySelectorAll('.trans-line').forEach(el=>el.classList.toggle('hidden',!showTrans));}
function setFontSize(val){document.documentElement.style.setProperty('--font-size',val+'px');}function toggleToolbar(){document.getElementById('toolbar').classList.toggle('collapsed');}
window.addEventListener('scroll',()=>{document.getElementById('toolbar').classList.toggle('scrolled',window.scrollY>5);},{passive:true});
updateAll();
