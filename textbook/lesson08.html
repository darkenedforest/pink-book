<style>
:root{--bg:#f7f3ec;--card-bg:#fffdf8;--text:#2c2416;--text-light:#6b5d4d;--accent:#b8433a;--grammar-color:#7b2d8e;--border:#e0d5c5;--popup-bg:#fffef9;--shadow:0 8px 32px rgba(44,36,22,0.12);--hira-color:#999;--trans-color:#5a7a5a;--font-size:18px;}
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Noto Serif JP',serif;background:var(--bg);color:var(--text);min-height:100vh;}.page-bg{background:linear-gradient(160deg,#f7f3ec,#efe8dc);min-height:100vh;padding-bottom:3rem;}
.toolbar{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,#f7f3ec,rgba(247,243,236,0.97));backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding-bottom:0.4rem;transition:box-shadow 0.3s;}.toolbar.scrolled{box-shadow:0 2px 16px rgba(44,36,22,0.1);}
.toolbar-header{display:flex;align-items:center;justify-content:center;padding:0.7rem 1rem 0.15rem;position:relative;}.toolbar-header h1{font-size:1.3rem;font-weight:700;color:var(--accent);letter-spacing:0.06em;}.toolbar-header .sub{font-family:'Source Sans Pro',sans-serif;font-size:0.72rem;color:var(--text-light);margin-left:0.5rem;align-self:flex-end;padding-bottom:0.08rem;}

.toolbar-body{max-height:160px;overflow:hidden;transition:max-height 0.35s ease,opacity 0.25s ease;opacity:1;}.toolbar.collapsed .toolbar-body{max-height:0;opacity:0;}
.controls-row1{max-width:720px;margin:0.3rem auto 0;padding:0 1rem;display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center;}
.toggle-btn{font-family:'Source Sans Pro',sans-serif;font-size:0.75rem;font-weight:600;padding:0.35rem 0;border-radius:999px;border:2px solid var(--border);background:var(--card-bg);color:var(--text-light);cursor:pointer;transition:all 0.2s;user-select:none;white-space:nowrap;width:5.5rem;text-align:center;}.toggle-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(184,67,58,0.06);}.toggle-btn:hover{border-color:var(--accent);}
.controls-row2{max-width:720px;margin:0.35rem auto 0;padding:0 1rem;display:flex;align-items:center;justify-content:space-between;}
.slider-group{display:flex;align-items:center;gap:0.4rem;font-family:'Source Sans Pro',sans-serif;font-size:0.72rem;color:var(--text-light);}.slider-group input[type=range]{width:70px;accent-color:var(--accent);cursor:pointer;}
.lang-picker-wrap{position:relative;display:inline-flex;align-items:center;}.lang-picker{font-family:'Source Sans Pro','Noto Sans SC','Noto Sans KR','Noto Sans Myanmar','Noto Sans Devanagari',sans-serif;font-size:0.78rem;font-weight:600;padding:0.35rem 2rem 0.35rem 0.7rem;border-radius:999px;border:2px solid #2471a3;background:rgba(36,113,163,0.07);color:#2471a3;cursor:pointer;appearance:none;-webkit-appearance:none;outline:none;transition:all 0.2s;}.lang-picker:hover,.lang-picker:focus{border-color:#1a5276;box-shadow:0 0 0 3px rgba(36,113,163,0.12);}.lang-picker-arrow{position:absolute;right:0.65rem;top:50%;transform:translateY(-50%);pointer-events:none;color:#2471a3;}
.legend{display:flex;justify-content:center;gap:0.9rem;padding:0.3rem 1rem 0;flex-wrap:wrap;}.legend-item{font-family:'Source Sans Pro',sans-serif;font-size:0.68rem;color:var(--text-light);display:flex;align-items:center;gap:0.25rem;}.legend-dot{width:8px;height:8px;border-radius:50%;}.legend-dot.vocab{background:var(--accent);opacity:0.4;}.legend-dot.grammar{background:var(--grammar-color);opacity:0.5;}
.content{max-width:720px;margin:0 auto;padding:0.8rem 1.2rem 3rem;}.passage-card{background:var(--card-bg);border-radius:12px;padding:2rem 1.8rem;box-shadow:var(--shadow);border:1px solid var(--border);line-height:2.6;font-size:var(--font-size);}.sentence-block{margin-bottom:0.7rem;}.jp-sentence{display:inline;}
ruby rt{font-size:0.5em;color:var(--hira-color);font-family:'Noto Sans JP',sans-serif;font-weight:400;}body.hide-furigana ruby rt{visibility:hidden;}
.word{cursor:pointer;border-bottom:1.5px dotted rgba(184,67,58,0.3);transition:background 0.15s;border-radius:2px;}.word:hover{background:rgba(184,67,58,0.08);}

.hira-line{display:block;font-family:'Noto Sans JP',sans-serif;font-size:0.78em;color:var(--hira-color);margin-top:0.1rem;line-height:1.6;transition:opacity 0.25s,max-height 0.3s;}.hira-line.hidden{opacity:0;max-height:0;overflow:hidden;margin:0;}
.trans-line{display:block;font-family:'Source Sans Pro','Noto Sans SC','Noto Sans KR','Noto Sans Myanmar','Noto Sans Devanagari',sans-serif;font-size:0.78em;color:var(--trans-color);margin-top:0.05rem;line-height:1.6;font-style:italic;transition:opacity 0.25s,max-height 0.3s;}.trans-line.hidden{opacity:0;max-height:0;overflow:hidden;margin:0;}

.popup-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;}.popup-overlay.show{display:block;}

@keyframes popIn{from{opacity:0;transform:translateY(6px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.popup .reading{font-family:'Noto Sans JP',sans-serif;font-size:1.05rem;color:var(--accent);font-weight:500;margin-bottom:0.15rem;}.popup .kanji-display{font-size:0.78rem;color:var(--text-light);margin-bottom:0.3rem;}.popup .meaning{font-family:'Source Sans Pro','Noto Sans SC','Noto Sans KR','Noto Sans Myanmar','Noto Sans Devanagari',sans-serif;font-size:0.88rem;color:var(--text);line-height:1.55;}
.popup .grammar-tag{display:inline-block;font-family:'Source Sans Pro',sans-serif;font-size:0.62rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#fff;background:var(--grammar-color);padding:0.12rem 0.5rem;border-radius:999px;margin-bottom:0.35rem;}
.popup .grammar-explain{font-family:'Source Sans Pro','Noto Sans SC','Noto Sans KR','Noto Sans Myanmar','Noto Sans Devanagari',sans-serif;font-size:0.8rem;color:var(--text);line-height:1.55;margin-top:0.25rem;}
@media(max-width:520px){.passage-card{padding:1.2rem 1rem;}.toolbar-header h1{font-size:1.15rem;}.popup{max-width:90vw;min-width:170px;}}

<script>
const LANGS=['en','zh','ko','my','vi','ne'];
const LANG_LABELS={en:'English',zh:'中文',ko:'한국어',my:'မြန်မာ',vi:'Tiếng Việt',ne:'नेपाली'};
const UI={trans_btn:{en:'Translation',zh:'翻译',ko:'번역',my:'ဘာသာပြန်',vi:'Dịch',ne:'अनुवाद'},leg_vocab:{en:'Vocabulary',zh:'词汇',ko:'어휘',my:'ဝေါဟာရ',vi:'Từ vựng',ne:'शब्दावली'},leg_grammar:{en:'Grammar',zh:'语法',ko:'문법',my:'သဒ္ဒါ',vi:'Ngữ pháp',ne:'व्याकरण'},grammar_tag:{en:'Grammar Point',zh:'语法点',ko:'문법 포인트',my:'သဒ္ဒါအချက်',vi:'Điểm ngữ pháp',ne:'व्याकरण बिन्दु'}};
let curLang='en';let showHira=true,showTrans=true,showFurigana=true;
function m(en,zh,ko,my,vi,ne){return{en,zh,ko,my,vi,ne};}
function W(s,r,meaning){return{w:s,r:r,m:meaning};}
function G(s,r,meaning,explain){return{g:s,r:r,m:meaning,x:explain};}
function P(t){return{p:t};}
function L(d){return(typeof d==='object'&&d[curLang])?d[curLang]:(typeof d==='string'?d:(d.en||''));}

const sentences=[
// ---- S1 ----
{
  parts:[
    W("日本人","にほんじん",m("Japanese person","日本人","일본인","ဂျပန်လူမျိုး","người Nhật","जापानी व्यक्ति")),
    P("は"),
    W("相手","あいて",m("partner, the other person","对方","상대방","အခြားသူ","đối phương","अर्को व्यक्ति")),
    P("の"),
    W("話","はなし",m("talk, conversation","话","이야기","စကား","câu chuyện","कुरा")),
    P("を"),
    W("聞いている","きいている",m("is listening to","正在听","듣고 있는","နားထောင်နေသော","đang nghe","सुनिरहेको")),
    G("あいだ","あいだ",
      m("while, during","期间","동안","အချိန်အတောအတွင်း","trong khi","बीचमा"),
      m("～あいだ (L8) — Indicates that while one action continues, another action also takes place throughout that period. Here: while listening to the other person's talk, Japanese people keep nodding.",
        "～あいだ（第8课）— 表示在一个动作持续的期间，另一个动作也在进行。此处：在听对方说话的期间，日本人不断点头。",
        "～あいだ (8과) — 한 동작이 지속되는 동안 다른 동작도 계속됨을 나타냅니다. 여기서는 상대방의 이야기를 듣는 동안 고개를 끄덕입니다.",
        "～あいだ (သင်ခန်းစာ 8) — လုပ်ဆောင်ချက်တစ်ခု ဆက်လက်ရှိနေစဉ် အခြားလုပ်ဆောင်ချက်လည်း ဖြစ်ပေါ်ကြောင်း ဖော်ပြသည်။",
        "～あいだ (Bài 8) — Chỉ rằng trong khi một hành động đang diễn ra, hành động khác cũng xảy ra suốt thời gian đó.",
        "～あいだ (पाठ 8) — एउटा काम भइरहेको बीचमा अर्को काम पनि भइरहन्छ भन्ने जनाउँछ।")),
    P("、"),
    W("何回","なんかい",m("many times","好几次","몇 번이나","အကြိမ်ကြိမ်","nhiều lần","कैपटक")),
    P("も"),
    W("うなずいたり","うなずいたり",m("nod (among other things)","点头（等）","고개를 끄덕이거나","ခေါင်းညိတ်ခြင်း","gật đầu","टाउको हल्लाउनु")),
    P("、「"),
    W("はい","はい",m("yes","是","네","ဟုတ်ကဲ့","vâng","हो")),
    P("、"),
    W("ええ","ええ",m("yes (casual)","嗯","네 (구어)","ဟုတ်ကဲ့ (ပြောစကား)","vâng (thân mật)","हो (अनौपचारिक)")),
    P("」とか「"),
    W("うん","うん",m("yeah, uh-huh","嗯","응","အင်း","ừ","उँ")),
    P("、"),
    W("うん","うん",m("yeah, uh-huh","嗯","응","အင်း","ừ","उँ")),
    P("」と"),
    W("言ったりする","いったりする",m("say (among other things)","说（等）","말하거나 한다","ပြောဆိုခြင်း","nói","भन्नु")),
    P("。"),
  ],
  hira:"にほんじん は あいて の はなし を きいている あいだ、 なんかい も うなずいたり、「はい、 ええ」 とか 「うん、 うん」 と いったりする。",
  trans:m(
    "While listening to the other person's talk, Japanese people nod many times and say things like 'hai, ee' or 'un, un.'",
    "日本人在听对方说话的期间，会多次点头，或说「はい、ええ」「うん、うん」等。",
    "일본인은 상대방의 이야기를 듣는 동안, 여러 번 고개를 끄덕이거나 '하이, 에에' 또는 '응, 응' 이라고 말하거나 한다.",
    "ဂျပန်လူမျိုးများသည် အခြားသူ၏ စကားကို နားထောင်နေစဉ် အကြိမ်ကြိမ် ခေါင်းညိတ်ခြင်း၊ 'はい、ええ' သို့မဟုတ် 'うん、うん' ဟု ပြောခြင်းများ ပြုလုပ်ကြသည်။",
    "Trong khi nghe người khác nói, người Nhật gật đầu nhiều lần và nói những câu như 'hai, ee' hay 'un, un.'",
    "जापानी व्यक्तिहरू अर्को व्यक्तिको कुरा सुन्दा बीचमा, धेरै पटक टाउको हल्लाउँछन् र 'はい、ええ' वा 'うん、うん' भन्छन्।")
},
// ---- S2 ----
{
  parts:[
    W("これ","これ",m("this","这","이것","ဒါ","điều này","यो")),
    P("を"),
    W("あいづち","あいづち",m("back-channel cues, nodding responses","附和","맞장구","ခေါင်းညိတ်ခြင်း","sự hưởng ứng","प्रतिक्रिया")),
    P("という。"),
  ],
  hira:"これ を あいづち と いう。",
  trans:m("This is called 'aizuchi.'","这叫做「あいづち」。","이것을 '아이즈치'라고 한다.","ဒါကို 'あいづち' ဟု ခေါ်သည်။","Điều này được gọi là 'aizuchi.'","यसलाई 'あいづち' भनिन्छ।")
},
// ---- S3 ----
{
  parts:[
    W("これ","これ",m("this","这","이것","ဒါ","điều này","यो")),
    P("は「"),
    W("あなた","あなた",m("you","你","당신","သင်","bạn","तपाईं")),
    P("の"),
    W("話","はなし",m("talk","话","이야기","စကား","câu chuyện","कुरा")),
    P("を"),
    W("聞いていますよ","きいていますよ",m("I am listening","正在听呢","듣고 있어요","နားထောင်နေပါတယ်","tôi đang nghe đây","सुनिरहेको छु")),
    P("。」ということを"),
    W("伝える","つたえる",m("to convey, communicate","传达","전하다","ပြောကြားသည်","truyền đạt","बुझाउनु")),
    W("合図","あいず",m("sign, cue, signal","信号，暗号","신호","အချက်ပြ","dấu hiệu","संकेत")),
    P("だ。"),
  ],
  hira:"これ は 「あなた の はなし を きいていますよ。」 と いう こと を つたえる あいず だ。",
  trans:m(
    "This is a signal that conveys 'I am listening to what you are saying.'",
    "这是传达「我在听你说话」的信号。",
    "이것은 '당신의 이야기를 듣고 있어요'라는 것을 전하는 신호다.",
    "ဒါက 'သင့်စကားကို နားထောင်နေပါတယ်' ဆိုတာကို ပြောကြားတဲ့ အချက်ပြမှုဖြစ်သည်။",
    "Đây là dấu hiệu truyền đạt rằng 'tôi đang nghe bạn nói.'",
    "यो 'तपाईंको कुरा सुनिरहेको छु' भन्ने कुरा बुझाउने संकेत हो।")
},
// ---- S4 ----
{
  parts:[
    W("だから","だから",m("so, therefore","所以","그래서","ဒါကြောင့်","vì vậy","त्यसैले")),
    P("、"),
    W("うなずいたり","うなずいたり",m("nod (among other things)","点头（等）","고개를 끄덕이거나","ခေါင်းညိတ်ခြင်း","gật đầu","टाउको हल्लाउनु")),
    P("、「"),
    W("うん","うん",m("yeah","嗯","응","အင်း","ừ","उँ")),
    P("、"),
    W("うん","うん",m("yeah","嗯","응","အင်း","ừ","उँ")),
    P("」と"),
    W("言っていて","いっていて",m("even if one is saying","即使说着","말하고 있어도","ပြောနေသော်လည်း","dù đang nói","भनिरहे पनि")),
    P("も、"),
    W("相手","あいて",m("the other person","对方","상대방","အခြားသူ","đối phương","अर्को व्यक्ति")),
    P("の"),
    W("話","はなし",m("talk","话","이야기","စကား","câu chuyện","कुरा")),
    P("に100％"),
    W("賛成している","さんせいしている",m("agree with, approve of","赞成","찬성하고 있는","သဘောတူသော","đồng ý","सहमत")),
    G("わけではない","わけではない",
      m("it doesn't mean that","并不是","~한 것은 아니다","ဆိုလိုတာ မဟုတ်ပါ","không có nghĩa là","भन्ने होइन"),

    "나라에 따라 이야기를 듣는 방법은 다양하다.",
    "နိုင်ငံပေါ်မူတည်ပြီး စကားနားထောင်ပုံ အမျိုးမျိုးဖြစ်သည်။",
    "Cách nghe câu chuyện khác nhau tùy theo quốc gia.",
    "देश अनुसार कुरा सुन्ने तरिका विविध छ।")

// ========== RENDERING ==========
function rubyHTML(s,r){if(/^[\u3040-\u309F\u30A0-\u30FFー\uFF01-\uFF5E「」（）]+$/.test(s))return s;return`<ruby>${s}<rt>${r}</rt></ruby>`;}
function renderPassage(){
  const el=document.getElementById('passage');el.innerHTML='';
  sentences.forEach((s,si)=>{
    const block=document.createElement('div');block.className='sentence-block';
    const jpLine=document.createElement('span');jpLine.className='jp-sentence';
    s.parts.forEach(part=>{
      if(part.w){const span=document.createElement('span');span.className='word';span.innerHTML=rubyHTML(part.w,part.r);span.onclick=e=>showPopup(e,{type:'word',reading:part.r,word:part.w,meaning:L(part.m)});jpLine.appendChild(span);}
      else if(part.g){const span=document.createElement('span');span.className='grammar';span.innerHTML=rubyHTML(part.g,part.r);span.onclick=e=>showPopup(e,{type:'grammar',reading:part.r,word:part.g,meaning:L(part.m),explain:L(part.x)});jpLine.appendChild(span);}
      else if(part.p!==undefined){const span=document.createElement('span');span.innerHTML=part.p;jpLine.appendChild(span);}
    });
    block.appendChild(jpLine);
    const hiraLine=document.createElement('span');hiraLine.className='hira-line'+(showHira?'':' hidden');hiraLine.textContent=s.hira;block.appendChild(hiraLine);
    const transLine=document.createElement('span');transLine.className='trans-line'+(showTrans?'':' hidden');transLine.textContent=L(s.trans);block.appendChild(transLine);
    el.appendChild(block);
    if(si===3){const br=document.createElement('div');br.className='para-break';el.appendChild(br);}
  });
}
function renderLangPicker(){const sel=document.getElementById('langPicker');sel.innerHTML='';LANGS.forEach(code=>{const opt=document.createElement('option');opt.value=code;opt.textContent=LANG_LABELS[code];if(code===curLang)opt.selected=true;sel.appendChild(opt);});}
function setLang(code){curLang=code;updateAll();}
function updateUI(){document.querySelectorAll('[data-ui]').forEach(el=>{const key=el.getAttribute('data-ui');if(UI[key])el.textContent=L(UI[key]);});}
function updateAll(){renderLangPicker();updateUI();renderPassage();}
function showPopup(e,data){
  e.stopPropagation();const popup=document.getElementById('popup');const overlay=document.getElementById('popupOverlay');let html='';
  if(data.type==='grammar'){html+=`<div class="grammar-tag">${L(UI.grammar_tag)}</div>`;html+=`<div class="reading">${data.reading}</div>`;if(data.word!==data.reading)html+=`<div class="kanji-display">${data.word}</div>`;html+=`<div class="meaning"><strong>${data.meaning}</strong></div>`;html+=`<div class="grammar-explain">${data.explain}</div>`;}
  else{html+=`<div class="reading">${data.reading}</div>`;if(data.word!==data.reading)html+=`<div class="kanji-display">${data.word}</div>`;html+=`<div class="meaning">${data.meaning}</div>`;}
  popup.innerHTML=html;popup.classList.add('show');overlay.classList.add('show');
  const rect=e.currentTarget.getBoundingClientRect();const popW=Math.min(340,window.innerWidth-20);let left=rect.left+rect.width/2-popW/2;if(left<10)left=10;if(left+popW>window.innerWidth-10)left=window.innerWidth-popW-10;let top=rect.bottom+10;popup.style.transform='none';if(top+220>window.innerHeight){top=rect.top-10;popup.style.transform='translateY(-100%)';}popup.style.left=left+'px';popup.style.top=top+'px';popup.style.width=popW+'px';
}
function closePopup(){document.getElementById('popup').classList.remove('show');document.getElementById('popupOverlay').classList.remove('show');}
function toggleFurigana(){showFurigana=!showFurigana;document.body.classList.toggle('hide-furigana',!showFurigana);document.getElementById('btnFurigana').classList.toggle('active',showFurigana);}
function toggleHira(){showHira=!showHira;document.getElementById('btnHira').classList.toggle('active',showHira);document.querySelectorAll('.hira-line').forEach(el=>el.classList.toggle('hidden',!showHira));}
function toggleTrans(){showTrans=!showTrans;document.getElementById('btnTrans').classList.toggle('active',showTrans);document.querySelectorAll('.trans-line').forEach(el=>el.classList.toggle('hidden',!showTrans));}
function setFontSize(val){document.documentElement.style.setProperty('--font-size',val+'px');}
function toggleToolbar(){document.getElementById('toolbar').classList.toggle('collapsed');}
window.addEventListener('scroll',()=>{document.getElementById('toolbar').classList.toggle('scrolled',window.scrollY>5);},{passive:true});
updateAll();
</script>
