<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第9課 – 男の仕事・女の仕事</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&family=Source+Sans+Pro:wght@400;600&family=Noto+Sans+SC:wght@400;500&family=Noto+Sans+KR:wght@400;500&family=Noto+Sans+Myanmar:wght@400;500&family=Noto+Sans+Devanagari:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f3ec;--card-bg:#fffdf8;--text:#2c2416;--text-light:#6b5d4d;
  --accent:#b8433a;--grammar-color:#7b2d8e;--border:#e0d5c5;
  --popup-bg:#fffef9;--shadow:0 8px 32px rgba(44,36,22,0.12);
  --hira-color:#999;--trans-color:#5a7a5a;--font-size:18px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Serif JP',serif;background:var(--bg);color:var(--text);min-height:100vh;}
.page-bg{background:linear-gradient(160deg,#f7f3ec,#efe8dc);min-height:100vh;padding-bottom:3rem;}

/* Sticky toolbar */
.toolbar{
  position:sticky;top:0;z-index:100;
  background:linear-gradient(180deg,#f7f3ec,rgba(247,243,236,0.97));
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);padding-bottom:0.4rem;
  transition:box-shadow 0.3s;
}
.toolbar.scrolled{box-shadow:0 2px 16px rgba(44,36,22,0.1);}
.toolbar-header{
  display:flex;align-items:center;justify-content:center;
  padding:0.7rem 1rem 0.15rem;position:relative;
}
.toolbar-header h1{font-size:1.3rem;font-weight:700;color:var(--accent);letter-spacing:0.06em;}
.toolbar-header .sub{
  font-family:'Source Sans Pro',sans-serif;font-size:0.72rem;color:var(--text-light);
  margin-left:0.5rem;align-self:flex-end;padding-bottom:0.08rem;
}
.collapse-btn{
  position:absolute;right:1rem;top:50%;transform:translateY(-50%);
  background:none;border:2px solid var(--border);border-radius:50%;
  width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text-light);transition:all 0.2s;
}
.collapse-btn:hover{border-color:var(--accent);color:var(--accent);}
.collapse-btn svg{transition:transform 0.3s;}
.toolbar.collapsed .collapse-btn svg{transform:rotate(180deg);}
.toolbar-body{max-height:160px;overflow:hidden;transition:max-height 0.35s ease,opacity 0.25s ease;opacity:1;}
.toolbar.collapsed .toolbar-body{max-height:0;opacity:0;}

/* Controls row 1: toggle buttons */
.controls-row1{
  max-width:720px;margin:0.3rem auto 0;padding:0 1rem;
  display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center;
}
.toggle-btn{
  font-family:'Source Sans Pro',sans-serif;font-size:0.75rem;font-weight:600;
  padding:0.35rem 0;border-radius:999px;border:2px solid var(--border);
  background:var(--card-bg);color:var(--text-light);cursor:pointer;
  transition:all 0.2s;user-select:none;white-space:nowrap;
  width:5.5rem;text-align:center;
}
.toggle-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(184,67,58,0.06);}
.toggle-btn:hover{border-color:var(--accent);}

/* Controls row 2: lang picker left, slider right */
.controls-row2{
  max-width:720px;margin:0.35rem auto 0;padding:0 1rem;
  display:flex;align-items:center;justify-content:space-between;
}
.slider-group{
  display:flex;align-items:center;gap:0.4rem;
  font-family:'Source Sans Pro',sans-serif;font-size:0.72rem;color:var(--text-light);
}
.slider-group input[type=range]{width:70px;accent-color:var(--accent);cursor:pointer;}

/* Language picker */
.lang-picker-wrap{
  position:relative;display:inline-flex;align-items:center;
}
.lang-picker{
  font-family:'Source Sans Pro','Noto Sans SC','Noto Sans KR','Noto Sans Myanmar','Noto Sans Devanagari',sans-serif;
  font-size:0.78rem;font-weight:600;
  padding:0.35rem 2rem 0.35rem 0.7rem;
  border-radius:999px;border:2px solid #2471a3;
  background:rgba(36,113,163,0.07);color:#2471a3;
  cursor:pointer;appearance:none;-webkit-appearance:none;
  outline:none;transition:all 0.2s;
}
.lang-picker:hover,.lang-picker:focus{border-color:#1a5276;box-shadow:0 0 0 3px rgba(36,113,163,0.12);}
.lang-picker-arrow{
  position:absolute;right:0.65rem;top:50%;transform:translateY(-50%);
  pointer-events:none;color:#2471a3;
}

/* Legend */
.legend{
  display:flex;justify-content:center;gap:0.9rem;padding:0.3rem 1rem 0;flex-wrap:wrap;
}
.legend-item{
  font-family:'Source Sans Pro',sans-serif;font-size:0.68rem;color:var(--text-light);
  display:flex;align-items:center;gap:0.25rem;
}
.legend-dot{width:8px;height:8px;border-radius:50%;}
.legend-dot.vocab{background:var(--accent);opacity:0.4;}
.legend-dot.grammar{background:var(--grammar-color);opacity:0.5;}

/* Content */
.content{max-width:720px;margin:0 auto;padding:0.8rem 1.2rem 3rem;}
.passage-card{
  background:var(--card-bg);border-radius:12px;padding:2rem 1.8rem;
  box-shadow:var(--shadow);border:1px solid var(--border);
  line-height:2.6;font-size:var(--font-size);
}
.sentence-block{margin-bottom:0.7rem;}
.jp-sentence{display:inline;}
ruby rt{font-size:0.5em;color:var(--hira-color);font-family:'Noto Sans JP',sans-serif;font-weight:400;}
body.hide-furigana ruby rt{visibility:hidden;}
.word{cursor:pointer;border-bottom:1.5px dotted rgba(184,67,58,0.3);transition:background 0.15s;border-radius:2px;}
.word:hover{background:rgba(184,67,58,0.08);}
.grammar{
  font-weight:700;color:var(--grammar-color);cursor:pointer;
  border-bottom:2px solid rgba(123,45,142,0.35);border-radius:2px;transition:background 0.15s;
}
.grammar:hover{background:rgba(123,45,142,0.08);}
.hira-line{
  display:block;font-family:'Noto Sans JP',sans-serif;font-size:0.78em;
  color:var(--hira-color);margin-top:0.1rem;line-height:1.6;
  transition:opacity 0.25s,max-height 0.3s;
}
.hira-line.hidden{opacity:0;max-height:0;overflow:hidden;margin:0;}
.trans-line{
  display:block;font-family:'Source Sans Pro','Noto Sans SC','Noto Sans KR','Noto Sans Myanmar','Noto Sans Devanagari',sans-serif;
  font-size:0.78em;color:var(--trans-color);margin-top:0.05rem;line-height:1.6;font-style:italic;
  transition:opacity 0.25s,max-height 0.3s;
}
.trans-line.hidden{opacity:0;max-height:0;overflow:hidden;margin:0;}
.para-break{height:0.6rem;}

/* Popup */
.popup-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;}
.popup-overlay.show{display:block;}
.popup{
  display:none;position:fixed;z-index:1000;background:var(--popup-bg);
  border:1px solid var(--border);border-radius:10px;padding:1rem 1.2rem;
  box-shadow:0 12px 40px rgba(44,36,22,0.18);max-width:360px;min-width:200px;
  animation:popIn 0.18s ease-out;
}
.popup.show{display:block;}
@keyframes popIn{from{opacity:0;transform:translateY(6px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.popup .reading{font-family:'Noto Sans JP',sans-serif;font-size:1.05rem;color:var(--accent);font-weight:500;margin-bottom:0.15rem;}
.popup .kanji-display{font-size:0.78rem;color:var(--text-light);margin-bottom:0.3rem;}
.popup .meaning{
  font-family:'Source Sans Pro','Noto Sans SC','Noto Sans KR','Noto Sans Myanmar','Noto Sans Devanagari',sans-serif;
  font-size:0.88rem;color:var(--text);line-height:1.55;
}
.popup .grammar-tag{
  display:inline-block;font-family:'Source Sans Pro',sans-serif;font-size:0.62rem;font-weight:600;
  text-transform:uppercase;letter-spacing:0.06em;color:#fff;background:var(--grammar-color);
  padding:0.12rem 0.5rem;border-radius:999px;margin-bottom:0.35rem;
}
.popup .grammar-explain{
  font-family:'Source Sans Pro','Noto Sans SC','Noto Sans KR','Noto Sans Myanmar','Noto Sans Devanagari',sans-serif;
  font-size:0.8rem;color:var(--text);line-height:1.55;margin-top:0.25rem;
}
@media(max-width:520px){
  .passage-card{padding:1.2rem 1rem;}
  .toolbar-header h1{font-size:1.15rem;}
  .popup{max-width:90vw;min-width:170px;}
}
</style>
</head>
<body>
<div class="page-bg">

<div class="toolbar" id="toolbar">
  <div class="toolbar-header">
    <h1>男の仕事・女の仕事</h1>
    <span class="sub">第9課</span>
    <button class="collapse-btn" onclick="toggleToolbar()" aria-label="Toggle controls">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </button>
  </div>
  <div class="toolbar-body">
    <div class="controls-row2">
      <div class="lang-picker-wrap">
        <select class="lang-picker" id="langPicker" onchange="setLang(this.value)"></select>
        <svg class="lang-picker-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
      <div class="slider-group">
        <span class="slider-label">Aa</span>
        <input type="range" min="14" max="28" value="18" id="fontSlider" oninput="setFontSize(this.value)">
        <span class="slider-label" style="font-size:1.1em;">Aa</span>
      </div>
    </div>
    <div class="controls-row1">
      <button class="toggle-btn active" id="btnFurigana" onclick="toggleFurigana()">振り仮名</button>
      <button class="toggle-btn active" id="btnHira" onclick="toggleHira()">ひらがな</button>
      <button class="toggle-btn active" id="btnTrans" onclick="toggleTrans()" data-ui="trans_btn"></button>
    </div>
    <div class="legend">
      <div class="legend-item"><span class="legend-dot vocab"></span> <span data-ui="leg_vocab"></span></div>
      <div class="legend-item"><span class="legend-dot grammar"></span> <b><span data-ui="leg_grammar"></span></b></div>
    </div>
  </div>
</div>

<div class="content">
  <div class="passage-card" id="passage"></div>
</div>

<div class="popup-overlay" id="popupOverlay" onclick="closePopup()"></div>
<div class="popup" id="popup"></div>
</div>

<script>
// ========== LANGUAGES ==========
const LANGS = ['en','zh','ko','my','vi','ne'];
const LANG_LABELS = {en:'English',zh:'中文',ko:'한국어',my:'မြန်မာ',vi:'Tiếng Việt',ne:'नेपाली'};

// UI strings per language
const UI = {
  trans_btn:   {en:'Translation',zh:'翻译',ko:'번역',my:'ဘာသာပြန်',vi:'Dịch',ne:'अनुवाद'},
  leg_vocab:   {en:'Vocabulary',zh:'词汇',ko:'어휘',my:'ဝေါဟာရ',vi:'Từ vựng',ne:'शब्दावली'},
  leg_grammar: {en:'Grammar',zh:'语法',ko:'문법',my:'သဒ္ဒါ',vi:'Ngữ pháp',ne:'व्याकरण'},
  grammar_tag: {en:'Grammar Point',zh:'语法点',ko:'문법 포인트',my:'သဒ္ဒါအချက်',vi:'Điểm ngữ pháp',ne:'व्याकरण बिन्दु'},
};

let curLang = 'en';
let showHira = true, showTrans = true, showFurigana = true;

// ========== MULTI-LANG HELPER ==========
// m() creates a multi-lang meaning object. Pass: en, zh, ko, my, vi, ne
function m(en,zh,ko,my,vi,ne){ return {en,zh,ko,my,vi,ne}; }
function W(surface,reading,meaning){ return {w:surface,r:reading,m:meaning}; }
function G(surface,reading,meaning,explain){ return {g:surface,r:reading,m:meaning,x:explain}; }
function P(text){ return {p:text}; }
function L(data){ return (typeof data==='object' && data[curLang]) ? data[curLang] : (typeof data==='string' ? data : (data.en||'')); }

// ========== SENTENCE DATA ==========
const sentences = [
// ---- S1 ----
{
  parts:[
    W("以前","いぜん", m("before, previously","以前，之前","이전에","ယခင်က","trước đây","पहिले")),
    W("女性","じょせい", m("female, woman","女性","여성","အမျိုးသမီး","phụ nữ","महिला")),
    P("の"),
    W("職場","しょくば", m("workplace","职场，工作单位","직장","အလုပ်ခွင်","nơi làm việc","कार्यस्थल")),
    P("と"),
    W("言われていた","いわれていた", m("was said to be (passive of 言う)","被称为（言う的被动形式）","~라고 불렸다 (言う의 수동형)","ဟုခေါ်ဝေါ်ခံရသည် (言う ၏ passive)","được gọi là (thể bị động của 言う)","भनिन्थ्यो (言うको passive)")),
    W("所","ところ", m("place","地方","곳","နေရာ","nơi","ठाउँ")),
    P("で、"),
    W("男性","だんせい", m("male, man","男性","남성","အမျိုးသား","nam giới","पुरुष")),
    P("も"),
    W("働く","はたらく", m("to work","工作","일하다","အလုပ်လုပ်သည်","làm việc","काम गर्नु")),
    G("ようになった","ようになった",
      m("came to ~ / started to ~","变得开始～","~하게 되었다","~ဖြစ်လာသည်","trở nên ~","~गर्न थाल्यो"),
      m("Vる＋ようになる — Indicates a gradual change to a new state. Here: men came to work in women's workplaces.",
        "Vる＋ようになる — 表示逐渐变化到新状态。此处：男性开始在女性的职场工作。",
        "Vる＋ようになる — 새로운 상태로의 점진적 변화를 나타냅니다. 여기서는 남성도 여성의 직장에서 일하게 되었다는 의미입니다.",
        "Vる＋ようになる — အခြေအနေအသစ်သို့ တဖြည်းဖြည်း ပြောင်းလဲခြင်းကို ဖော်ပြသည်။",
        "Vる＋ようになる — Biểu thị sự thay đổi dần sang trạng thái mới. Ở đây: nam giới bắt đầu làm việc ở nơi làm việc của nữ giới.",
        "Vる＋ようになる — नयाँ अवस्थामा बिस्तारै परिवर्तन हुनु। यहाँ: पुरुषहरू महिलाको कार्यस्थलमा काम गर्न थाले।")),
    P("。"),
  ],
  hira:"いぜん じょせい の しょくば と いわれていた ところ で、 だんせい も はたらく よう に なった。",
  trans: m(
    "Men also came to work in places that were previously considered women's workplaces.",
    "男性也开始在以前被称为女性职场的地方工作了。",
    "이전에 여성의 직장이라고 불리던 곳에서 남성도 일하게 되었다.",
    "ယခင်က အမျိုးသမီးများ၏ အလုပ်ခွင်ဟု ခေါ်ဝေါ်ခဲ့သော နေရာများတွင် အမျိုးသားများလည်း အလုပ်လုပ်လာကြသည်။",
    "Nam giới cũng bắt đầu làm việc ở những nơi trước đây được coi là nơi làm việc của phụ nữ.",
    "पहिले महिलाको कार्यस्थल भनिने ठाउँमा पुरुषहरू पनि काम गर्न थाले।"
  )
},
// ---- S2 ----
{
  parts:[
    W("それ","それ", m("that","那","그것","ထို","điều đó","त्यो")),
    G("にともなって","にともなって",
      m("as ~ / along with ~","随着～","~에 따라","~နှင့်အတူ","cùng với ~","~सँगसँगै"),
      m("［V辞書形/N］＋にともなって — As one thing changes, another changes. Used for large-scale changes. Here: as men entered women's workplaces, job titles changed.",
        "［V辞書形/N］＋にともなって — 随着一件事变化，另一件事也跟着变化。常用于大规模变化。此处：随着男性进入女性职场，职业名称也改变了。",
        "［V사전형/N］＋にともなって — 하나가 변하면 다른 것도 따라 변합니다. 대규모 변화에 사용됩니다.",
        "［V辞書形/N］＋にともなって — တစ်ခုပြောင်းလဲသောအခါ နောက်တစ်ခုလည်း ပြောင်းလဲခြင်း။",
        "［V辞書形/N］＋にともなって — Khi một điều thay đổi, điều khác cũng thay đổi theo. Dùng cho thay đổi quy mô lớn.",
        "［V辞書形/N］＋にともなって — एउटा कुरा परिवर्तन हुँदा अर्को पनि परिवर्तन हुन्छ। ठूलो परिवर्तनमा प्रयोग गरिन्छ।")),
    P("、"),
    W("女性","じょせい", m("female, woman","女性","여성","အမျိုးသမီး","phụ nữ","महिला")),
    P("の"),
    W("仕事","しごと", m("work, job","工作","일, 직업","အလုပ်","công việc","काम")),
    P("を"),
    W("表す","あらわす", m("to express, represent","表示，代表","나타내다","ကိုယ်စားပြုသည်","biểu thị","प्रतिनिधित्व गर्नु")),
    P("「"),
    W("看護婦","かんごふ", m("nurse (old female term)","护士（旧称，女性用语）","간호부 (구 여성 용어)","သူနာပြု (ဟောင်း၊ အမျိုးသမီးသုံး)","y tá (từ cũ dành cho nữ)","नर्स (पुरानो महिला शब्द)")),
    P("」や「"),
    W("保母","ほぼ", m("childminder (old female term)","保育员（旧称，女性用语）","보모 (구 여성 용어)","ကလေးထိန်း (ဟောင်း)","bảo mẫu (từ cũ dành cho nữ)","बालस्याहारकर्ता (पुरानो महिला शब्द)")),
    P("」"),
    G("のような","のような",
      m("such as ~ / like ~","像～一样的","~와 같은","~ကဲ့သို့","như là ~","~जस्तो"),
      m("Nのような＋N — 'such as ~' or 'like ~.' Gives examples. Here: occupation names such as 看護婦 and 保母.",
        "Nのような＋N — '像～一样的'。用于举例。此处：像看護婦和保母这样的职业名称。",
        "Nのような＋N — '~와 같은'. 예를 들 때 사용합니다.",
        "Nのような＋N — '~ကဲ့သို့'။ ဥပမာပေးရန် သုံးသည်။",
        "Nのような＋N — 'như là ~'. Dùng để đưa ví dụ.",
        "Nのような＋N — '~जस्तो'। उदाहरण दिन प्रयोग गरिन्छ।")),
    W("職業","しょくぎょう", m("occupation","职业","직업","အသက်မွေးဝမ်းကျောင်း","nghề nghiệp","पेशा")),
    P("の"),
    W("名称","めいしょう", m("name, title","名称","명칭","အမည်","tên gọi","नाम")),
    P("は、「"),

// ========== RENDERING ==========
function rubyHTML(surface, reading) {
  if (/^[\u3040-\u309F\u30A0-\u30FFー\uFF01-\uFF5E「」（）]+$/.test(surface)) return surface;
  return `<ruby>${surface}<rt>${reading}</rt></ruby>`;
}

function renderPassage() {
  const el = document.getElementById('passage');
  el.innerHTML = '';
  sentences.forEach((s, si) => {
    const block = document.createElement('div');
    block.className = 'sentence-block';
    const jpLine = document.createElement('span');
    jpLine.className = 'jp-sentence';
    s.parts.forEach(part => {
      if (part.w) {
        const span = document.createElement('span');
        span.className = 'word';
        span.innerHTML = rubyHTML(part.w, part.r);
        span.onclick = e => showPopup(e, {type:'word', reading:part.r, word:part.w, meaning:L(part.m)});
        jpLine.appendChild(span);
      } else if (part.g) {
        const span = document.createElement('span');
        span.className = 'grammar';
        span.innerHTML = rubyHTML(part.g, part.r);
        span.onclick = e => showPopup(e, {type:'grammar', reading:part.r, word:part.g, meaning:L(part.m), explain:L(part.x)});
        jpLine.appendChild(span);
      } else if (part.p !== undefined) {
        const span = document.createElement('span');
        span.innerHTML = part.p;
        jpLine.appendChild(span);
      }
    });
    block.appendChild(jpLine);

    const hiraLine = document.createElement('span');
    hiraLine.className = 'hira-line' + (showHira ? '' : ' hidden');
    hiraLine.textContent = s.hira;
    block.appendChild(hiraLine);

    const transLine = document.createElement('span');
    transLine.className = 'trans-line' + (showTrans ? '' : ' hidden');
    transLine.textContent = L(s.trans);
    block.appendChild(transLine);

    el.appendChild(block);
    if (si === 3) { const br = document.createElement('div'); br.className = 'para-break'; el.appendChild(br); }
  });
}

function renderLangPicker() {
  const sel = document.getElementById('langPicker');
  sel.innerHTML = '';
  LANGS.forEach(code => {
    const opt = document.createElement('option');
    opt.value = code;
    opt.textContent = LANG_LABELS[code];
    if (code === curLang) opt.selected = true;
    sel.appendChild(opt);
  });
}
function setLang(code) { curLang = code; updateAll(); }

function updateUI() {
  document.querySelectorAll('[data-ui]').forEach(el => {
    const key = el.getAttribute('data-ui');
    if (UI[key]) el.textContent = L(UI[key]);
  });
}

function updateAll() {
  renderLangPicker();
  updateUI();
  renderPassage();
}

// ========== POPUP ==========
function showPopup(e, data) {
  e.stopPropagation();
  const popup = document.getElementById('popup');
  const overlay = document.getElementById('popupOverlay');
  let html = '';
  if (data.type === 'grammar') {
    html += `<div class="grammar-tag">${L(UI.grammar_tag)}</div>`;
    html += `<div class="reading">${data.reading}</div>`;
    if (data.word !== data.reading) html += `<div class="kanji-display">${data.word}</div>`;
    html += `<div class="meaning"><strong>${data.meaning}</strong></div>`;
    html += `<div class="grammar-explain">${data.explain}</div>`;
  } else {
    html += `<div class="reading">${data.reading}</div>`;
    if (data.word !== data.reading) html += `<div class="kanji-display">${data.word}</div>`;
    html += `<div class="meaning">${data.meaning}</div>`;
  }
  popup.innerHTML = html;
  popup.classList.add('show');
  overlay.classList.add('show');
  const rect = e.currentTarget.getBoundingClientRect();
  const popW = Math.min(340, window.innerWidth - 20);
  let left = rect.left + rect.width/2 - popW/2;
  if (left < 10) left = 10;
  if (left + popW > window.innerWidth - 10) left = window.innerWidth - popW - 10;
  let top = rect.bottom + 10;
  popup.style.transform = 'none';
  if (top + 220 > window.innerHeight) { top = rect.top - 10; popup.style.transform = 'translateY(-100%)'; }
  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
  popup.style.width = popW + 'px';
}
function closePopup() {
  document.getElementById('popup').classList.remove('show');
  document.getElementById('popupOverlay').classList.remove('show');
}

// ========== TOGGLES ==========
function toggleFurigana() {
  showFurigana = !showFurigana;
  document.body.classList.toggle('hide-furigana', !showFurigana);
  document.getElementById('btnFurigana').classList.toggle('active', showFurigana);
}
function toggleHira() {
  showHira = !showHira;
  document.getElementById('btnHira').classList.toggle('active', showHira);
  document.querySelectorAll('.hira-line').forEach(el => el.classList.toggle('hidden', !showHira));
}
function toggleTrans() {
  showTrans = !showTrans;
  document.getElementById('btnTrans').classList.toggle('active', showTrans);
  document.querySelectorAll('.trans-line').forEach(el => el.classList.toggle('hidden', !showTrans));
}
function setFontSize(val) { document.documentElement.style.setProperty('--font-size', val + 'px'); }
function toggleToolbar() { document.getElementById('toolbar').classList.toggle('collapsed'); }
window.addEventListener('scroll', () => {
  document.getElementById('toolbar').classList.toggle('scrolled', window.scrollY > 5);
}, {passive:true});

// Init
updateAll();
