<title>Episode 11 – 歯車の中</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f3ec;--card-bg:#fffdf8;--text:#2c2416;--text-light:#6b5d4d;
  --accent:#b8433a;--grammar-color:#7b2d8e;--border:#e0d5c5;
  --popup-bg:#fffef9;--shadow:0 8px 32px rgba(44,36,22,0.12);
  --hira-color:#999;--trans-color:#5a7a5a;--font-size:18px;
  --page-max-width:720px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Noto Serif JP',serif;background:var(--bg);color:var(--text);
  min-height:100vh;overflow:hidden;
}

/* ===== BOOK CONTAINER ===== */
.book-wrapper{
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;
  background:linear-gradient(160deg,#f7f3ec,#efe8dc);
}

/* ===== TOP BAR ===== */
.top-bar{
  flex-shrink:0;padding:0.5rem 1rem;
  border-bottom:1px solid var(--border);
  background:rgba(247,243,236,0.97);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:space-between;
  z-index:100;
}
.top-bar-title{
  font-size:1.1rem;font-weight:700;color:var(--accent);
  letter-spacing:0.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  flex:1;text-align:center;
}
.top-bar-sub{
  font-family:'Source Sans Pro',sans-serif;font-size:0.7rem;color:var(--text-light);
  margin-left:0.4rem;
}
.top-bar-btn{
  background:none;border:none;cursor:pointer;color:var(--text-light);
  padding:0.3rem;border-radius:6px;transition:all 0.2s;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.top-bar-btn:hover{color:var(--accent);background:rgba(184,67,58,0.06);}
.top-bar-left,.top-bar-right{display:flex;align-items:center;gap:0.3rem;flex-shrink:0;}

/* ===== SETTINGS DRAWER ===== */
.settings-drawer{
  flex-shrink:0;overflow:hidden;max-height:0;
  transition:max-height 0.3s ease;
  background:rgba(247,243,236,0.97);border-bottom:1px solid var(--border);
}
.settings-drawer.open{max-height:180px;}
.settings-inner{
  padding:0.6rem 1rem 0.8rem;max-width:var(--page-max-width);margin:0 auto;
  display:flex;flex-direction:column;gap:0.5rem;
}
.settings-row{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;}
.toggle-btn{
  font-family:'Source Sans Pro',sans-serif;font-size:0.72rem;font-weight:600;
  padding:0.3rem 0.7rem;border-radius:999px;border:1.5px solid var(--border);
  background:var(--card-bg);color:var(--text-light);cursor:pointer;
  transition:all 0.2s;user-select:none;white-space:nowrap;
}
.toggle-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(184,67,58,0.06);}
.slider-group{
  display:flex;align-items:center;gap:0.3rem;margin-left:auto;
  font-family:'Source Sans Pro',sans-serif;font-size:0.72rem;color:var(--text-light);
}
.slider-group input[type=range]{width:65px;accent-color:var(--accent);cursor:pointer;}
.legend{display:flex;gap:0.7rem;flex-wrap:wrap;}
.legend-item{
  font-family:'Source Sans Pro',sans-serif;font-size:0.65rem;color:var(--text-light);
  display:flex;align-items:center;gap:0.2rem;
}
.legend-dot{width:7px;height:7px;border-radius:50%;}
.legend-dot.vocab{background:var(--accent);opacity:0.4;}
.legend-dot.grammar{background:var(--grammar-color);opacity:0.5;}
.legend-dot.core{display:none;}

/* ===== PAGE AREA ===== */
.page-area{
  flex:1;overflow:hidden;position:relative;
  display:flex;align-items:stretch;justify-content:center;
}
.page-container{
  width:100%;max-width:var(--page-max-width);position:relative;
  perspective:1200px;
}
.page{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:var(--card-bg);
  border-left:1px solid var(--border);border-right:1px solid var(--border);
  box-shadow:2px 0 12px rgba(44,36,22,0.06),-2px 0 12px rgba(44,36,22,0.06);
  overflow-y:auto;overflow-x:hidden;
  padding:1.8rem 1.6rem 2.5rem;
  line-height:2.6;font-size:var(--font-size);
  transition:transform 0.4s ease,opacity 0.4s ease;
  will-change:transform,opacity;
  -webkit-overflow-scrolling:touch;
}
.page.current{transform:translateX(0);opacity:1;z-index:2;}
.page.exit-left{transform:translateX(-100%);opacity:0;z-index:1;}
.page.exit-right{transform:translateX(100%);opacity:0;z-index:1;}
.page.enter-left{transform:translateX(-100%);opacity:0;z-index:1;}
.page.enter-right{transform:translateX(100%);opacity:0;z-index:1;}

/* Page edge shadow for book feel */
.page::after{
  content:'';position:absolute;top:0;right:0;bottom:0;width:20px;
  background:linear-gradient(to left,rgba(44,36,22,0.04),transparent);
  pointer-events:none;
}
.page::before{
  content:'';position:absolute;top:0;left:0;bottom:0;width:20px;
  background:linear-gradient(to right,rgba(44,36,22,0.04),transparent);
  pointer-events:none;
}

/* ===== SENTENCE STYLING ===== */
.sentence-block{margin-bottom:0.6rem;}
.jp-sentence{display:inline;}
ruby rt{font-size:0.5em;color:var(--hira-color);font-family:'Noto Sans JP',sans-serif;font-weight:400;}
body.hide-furigana ruby rt{visibility:hidden;}
.word{cursor:pointer;transition:background 0.15s;border-radius:2px;}
.word:hover{background:rgba(184,67,58,0.08);}
.word.core{}
.grammar{
  font-weight:700;color:var(--grammar-color);cursor:pointer;
  border-bottom:2px solid rgba(123,45,142,0.35);border-radius:2px;transition:background 0.15s;
}
.grammar:hover{background:rgba(123,45,142,0.08);}
.hira-line{
  display:block;font-family:'Noto Sans JP',sans-serif;font-size:0.78em;
  color:var(--hira-color);margin-top:0.1rem;line-height:1.6;
  transition:opacity 0.25s,max-height 0.3s;
}
.hira-line.hidden{opacity:0;max-height:0;overflow:hidden;margin:0;}
.trans-line{
  display:block;font-family:'Source Sans Pro',sans-serif;
  font-size:0.78em;color:var(--trans-color);margin-top:0.05rem;line-height:1.6;font-style:italic;
  transition:opacity 0.25s,max-height 0.3s;
}
.trans-line.hidden{opacity:0;max-height:0;overflow:hidden;margin:0;}

/* ===== SCENE HEADERS ===== */
.scene-break{
  margin:2rem 0 1.2rem;padding-top:1.5rem;
  border-top:1px solid var(--border);
}
.scene-break:first-child{margin-top:0;padding-top:0;border-top:none;}

/* Speaker label — left-aligned, subtle */
.speaker-label{
  display:block;font-family:'Source Sans Pro',sans-serif;
  font-size:0.72em;font-weight:600;color:var(--accent);
  letter-spacing:0.05em;margin-bottom:0.4rem;
  padding-left:0.1rem;
}

/* ===== BOTTOM BAR ===== */
.bottom-bar{
  flex-shrink:0;
  border-top:1px solid var(--border);
  background:rgba(247,243,236,0.97);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  padding:0.4rem 1rem;z-index:100;
}
.bottom-inner{
  max-width:var(--page-max-width);margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
}
.page-nav-btn{
  background:none;border:none;cursor:pointer;
  font-family:'Source Sans Pro',sans-serif;font-size:0.82rem;font-weight:600;
  color:var(--accent);padding:0.4rem 0.8rem;border-radius:8px;
  transition:all 0.2s;display:flex;align-items:center;gap:0.3rem;
}
.page-nav-btn:hover{background:rgba(184,67,58,0.06);}
.page-nav-btn:disabled{color:var(--border);cursor:default;}
.page-nav-btn:disabled:hover{background:none;}
.page-info{
  font-family:'Source Sans Pro',sans-serif;font-size:0.72rem;color:var(--text-light);
  text-align:center;display:flex;flex-direction:column;align-items:center;gap:0.1rem;
}
.page-counter{font-weight:600;}
.bookmark-indicator{font-size:0.62rem;cursor:pointer;transition:color 0.2s;}
.bookmark-indicator:hover{color:var(--accent);}

/* ===== CHAPTER NAV ===== */
.chapter-nav{
  display:flex;justify-content:center;align-items:center;gap:0.8rem;
  padding:0.5rem 0 0.2rem;
}
.chapter-nav a{
  font-family:'Source Sans Pro',sans-serif;font-size:0.78rem;font-weight:600;
  color:var(--accent);text-decoration:none;padding:0.3rem 0.8rem;
  border:1.5px solid var(--accent);border-radius:999px;transition:all 0.2s;
}
.chapter-nav a:hover{background:var(--accent);color:#fff;}
.chapter-nav .disabled{color:var(--border);border-color:var(--border);pointer-events:none;}
.chapter-nav .toc-link{border:none;color:var(--text-light);}
.chapter-nav .toc-link:hover{color:var(--accent);background:none;}

/* ===== POPUP ===== */
.popup-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;}
.popup-overlay.show{display:block;}
.popup{
  display:none;position:fixed;z-index:1000;background:var(--popup-bg);
  border:1px solid var(--border);border-radius:10px;padding:1rem 1.2rem;
  box-shadow:0 12px 40px rgba(44,36,22,0.18);max-width:340px;min-width:200px;
  animation:popIn 0.18s ease-out;
}
.popup.show{display:block;}
@keyframes popIn{from{opacity:0;transform:translateY(6px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.popup .reading{font-family:'Noto Sans JP',sans-serif;font-size:1.05rem;color:var(--accent);font-weight:500;margin-bottom:0.15rem;}
.popup .kanji-display{font-size:0.78rem;color:var(--text-light);margin-bottom:0.3rem;}
.popup .meaning{font-family:'Source Sans Pro',sans-serif;font-size:0.88rem;color:var(--text);line-height:1.55;}
.popup .grammar-tag{
  display:inline-block;font-family:'Source Sans Pro',sans-serif;font-size:0.62rem;font-weight:600;
  text-transform:uppercase;letter-spacing:0.06em;color:#fff;background:var(--grammar-color);
  padding:0.12rem 0.5rem;border-radius:999px;margin-bottom:0.35rem;
}
.popup .grammar-explain{
  font-family:'Source Sans Pro',sans-serif;font-size:0.8rem;color:var(--text);line-height:1.55;margin-top:0.25rem;
}

/* ===== SWIPE ZONES ===== */
.swipe-zone-left,.swipe-zone-right{
  position:absolute;top:0;bottom:0;width:15%;z-index:3;cursor:pointer;
}
.swipe-zone-left{left:0;}
.swipe-zone-right{right:0;}

/* ===== COLLAPSED MODE (reading mode) ===== */
.book-wrapper.collapsed .top-bar{
  padding:0;border-bottom:1px solid rgba(224,213,197,0.5);
}
.book-wrapper.collapsed .top-bar-title,
.book-wrapper.collapsed .top-bar-right{display:none;}
.book-wrapper.collapsed .top-bar-left{
  width:100%;justify-content:center;
}
.book-wrapper.collapsed .top-bar-btn#btnToggleUI{
  padding:0.1rem 0.5rem;
}
.book-wrapper.collapsed .top-bar-btn#btnToggleUI svg{
  width:14px;height:14px;opacity:0.4;
}
.book-wrapper.collapsed .settings-drawer{max-height:0 !important;}
.book-wrapper.collapsed .bottom-bar{display:none;}
/* Chevron rotation: points up when collapsed (click to expand), down when expanded */
#btnToggleUI svg{transition:transform 0.3s ease;}
.book-wrapper.collapsed #btnToggleUI svg{transform:rotate(180deg);}

@media(max-width:520px){
  .page{padding:1.2rem 1rem 2rem;}
  .top-bar-title{font-size:0.95rem;}
  .popup{max-width:90vw;min-width:170px;}
  .swipe-zone-left,.swipe-zone-right{width:20%;}
}
</style>
</head>

<div class="popup" id="popup"></div>
</div>

// ========== PAGINATION ==========
// We measure how many sentences fit on a page dynamically
var SENTENCES_PER_PAGE = 12; // default, recalculated on resize

function paginateSentences() {
  pages = [];
  var i = 0;
  while (i < sentences.length) {
    var pageEnd = Math.min(i + SENTENCES_PER_PAGE, sentences.length);
    // Try not to break in the middle of a speaker's dialogue block
    // Find a scene break near the target if possible
    if (pageEnd < sentences.length) {
      var best = pageEnd;
      for (var j = pageEnd; j >= Math.max(i + Math.floor(SENTENCES_PER_PAGE * 0.6), i + 1); j--) {
        if (sentences[j - 1] && sentences[j - 1]._scene_break) {
          best = j;
          break;
        }
      }
      pageEnd = best;
    }
    var arr = [];
    for (var k = i; k < pageEnd; k++) arr.push(k);
    pages.push(arr);
    i = pageEnd;
  }
  totalPages = pages.length;
}

// ========== RENDERING ==========
function rubyHTML(surface, reading) {
  if (/^[\u3040-\u309F\u30A0-\u30FFー\uFF01-\uFF5E\u3000-\u303F]+$/.test(surface)) return surface;
  return '<ruby>' + surface + '<rt>' + reading + '</rt></ruby>';
}

function renderPage(pageIdx) {
  if (pageIdx < 0 || pageIdx >= totalPages) return;
  var el = document.getElementById('page');
  el.scrollTop = 0;
  el.innerHTML = '';
  var indices = pages[pageIdx];
  var lastSceneId = null;

  for (var ii = 0; ii < indices.length; ii++) {
    var si = indices[ii];
    var s = sentences[si];

    // Scene break divider
    var isNewScene = s._scene_break_before || (ii === 0 && pageIdx === 0) ||
      (si > 0 && sentences[si - 1] && sentences[si - 1]._scene_break);
    if (si > 0 && isNewScene) {
      var divider = document.createElement('div');
      divider.className = 'scene-break';
      el.appendChild(divider);
    }

    var block = document.createElement('div');
    block.className = 'sentence-block';
    block.setAttribute('data-si', si);

    // Speaker label
    if (s.speaker) {
      var label = document.createElement('div');
      label.className = 'speaker-label';
      label.textContent = s.speaker;
      block.appendChild(label);
    }

    var jpLine = document.createElement('span');
    jpLine.className = 'jp-sentence';
    s.parts.forEach(function(part) {
      if (part.w) {
        var span = document.createElement('span');
        span.className = part.core ? 'word core' : 'word';
        span.innerHTML = rubyHTML(part.w, part.r);
        span.onclick = function(e) {
          showPopup(e, {type:'word', reading:part.r, word:part.w, meaning:part.m});
          trackTap(si);
        };
        jpLine.appendChild(span);
      } else if (part.g) {
        var span = document.createElement('span');
        span.className = 'grammar';
        span.innerHTML = rubyHTML(part.g, part.r);
        span.onclick = function(e) {
          showPopup(e, {type:'grammar', reading:part.r, word:part.g, meaning:part.m, explain:part.x});
          trackTap(si);
        };
        jpLine.appendChild(span);
      } else if (part.p !== undefined) {
        var span = document.createElement('span');
        span.innerHTML = part.p;
        jpLine.appendChild(span);
      }
    });
    block.appendChild(jpLine);

    var hiraLine = document.createElement('span');
    hiraLine.className = 'hira-line' + (showHira ? '' : ' hidden');
    hiraLine.textContent = s.hira;
    block.appendChild(hiraLine);

    var transLine = document.createElement('span');
    transLine.className = 'trans-line' + (showTrans ? '' : ' hidden');
    transLine.textContent = s.trans;
    block.appendChild(transLine);

    el.appendChild(block);
  }

  updatePageInfo();
}

// ========== PAGE TURNING ==========
function goToPage(newPage, direction) {
  if (newPage < 0 || newPage >= totalPages || newPage === currentPage) return;
  var el = document.getElementById('page');

  // Simple slide animation
  var exitClass = direction === 'next' ? 'exit-left' : 'exit-right';
  var enterClass = direction === 'next' ? 'enter-right' : 'enter-left';

  el.classList.remove('current');
  el.classList.add(exitClass);

  setTimeout(function() {
    currentPage = newPage;
    renderPage(currentPage);
    el.classList.remove(exitClass);
    el.classList.add(enterClass);
    // Force reflow
    void el.offsetWidth;
    el.classList.remove(enterClass);
    el.classList.add('current');
    saveState();
  }, 200);
}

function nextPage() { goToPage(currentPage + 1, 'next'); }
function prevPage() { goToPage(currentPage - 1, 'prev'); }

function updatePageInfo() {
  document.getElementById('pageCounter').textContent = (currentPage + 1) + ' / ' + totalPages;
  document.getElementById('btnPrev').disabled = (currentPage === 0);
  document.getElementById('btnNext').disabled = (currentPage >= totalPages - 1);
  updateBookmarkDisplay();
}

// ========== BOOKMARK ==========
function trackTap(sentenceIdx) {
  if (sentenceIdx > bookmarkSentence) {
    bookmarkSentence = sentenceIdx;
    saveState();
    updateBookmarkDisplay();
  }
}

function setBookmarkHere() {
  // Set bookmark to the first sentence on the current page
  if (pages[currentPage] && pages[currentPage].length > 0) {
    bookmarkSentence = pages[currentPage][0];
    saveState();
    updateBookmarkDisplay();
  }
}

function goToBookmark() {
  var targetPage = findPageForSentence(bookmarkSentence);
  if (targetPage !== currentPage) {
    goToPage(targetPage, targetPage > currentPage ? 'next' : 'prev');
  }
}

function findPageForSentence(si) {
  for (var i = 0; i < pages.length; i++) {
    if (pages[i].indexOf(si) !== -1) return i;
    // If sentence is between pages, return the closest
    if (pages[i][pages[i].length - 1] >= si) return i;
  }
  return pages.length - 1;
}

function updateBookmarkDisplay() {
  var el = document.getElementById('bookmarkInfo');
  var bmPage = findPageForSentence(bookmarkSentence);
  if (bmPage === currentPage) {
    el.textContent = 'Bookmark: this page';
    el.style.color = 'var(--accent)';
  } else {
    el.textContent = 'Bookmark: pg ' + (bmPage + 1);
    el.style.color = '';
  }
}

// ========== STATE PERSISTENCE ==========
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      page: currentPage,
      bookmark: bookmarkSentence,
      hira: showHira,
      trans: showTrans,
      furigana: showFurigana,
      fontSize: document.getElementById('fontSlider').value
    }));
  } catch(e) {}
}

function loadState() {
  try {
    var data = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (data) {
      currentPage = Math.min(data.page || 0, totalPages - 1);
      bookmarkSentence = data.bookmark || 0;
      if (data.hira === false) toggleHira();
      if (data.trans === false) toggleTrans();
      if (data.furigana === false) toggleFurigana();
      if (data.fontSize) {
        document.getElementById('fontSlider').value = data.fontSize;
        setFontSize(data.fontSize);
      }
    }
  } catch(e) {}
}

// ========== POPUP ==========
function showPopup(e, data) {
  e.stopPropagation();
  var popup = document.getElementById('popup');
  var overlay = document.getElementById('popupOverlay');
  var html = '';
  if (data.type === 'grammar') {
    html += '<div class="grammar-tag">Grammar Point</div>';
    html += '<div class="reading">' + data.reading + '</div>';
    if (data.word !== data.reading) html += '<div class="kanji-display">' + data.word + '</div>';
    html += '<div class="meaning"><strong>' + data.meaning + '</strong></div>';
    if (data.explain) html += '<div class="grammar-explain">' + data.explain + '</div>';
  } else {
    html += '<div class="reading">' + data.reading + '</div>';
    if (data.word !== data.reading) html += '<div class="kanji-display">' + data.word + '</div>';
    html += '<div class="meaning">' + data.meaning + '</div>';
  }
  popup.innerHTML = html;
  popup.classList.add('show');
  overlay.classList.add('show');
  var rect = e.currentTarget.getBoundingClientRect();
  var popW = Math.min(340, window.innerWidth - 20);
  var left = rect.left + rect.width / 2 - popW / 2;
  if (left < 10) left = 10;
  if (left + popW > window.innerWidth - 10) left = window.innerWidth - popW - 10;
  var top = rect.bottom + 10;
  popup.style.transform = 'none';
  if (top + 220 > window.innerHeight) { top = rect.top - 10; popup.style.transform = 'translateY(-100%)'; }
  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
  popup.style.width = popW + 'px';
}
function closePopup() {
  document.getElementById('popup').classList.remove('show');
  document.getElementById('popupOverlay').classList.remove('show');
}

// ========== UI TOGGLE (expand/collapse everything) ==========
var uiCollapsed = false;
function toggleUI() {
  uiCollapsed = !uiCollapsed;
  var wrapper = document.querySelector('.book-wrapper');
  var drawer = document.getElementById('settingsDrawer');
  wrapper.classList.toggle('collapsed', uiCollapsed);
  // When expanding, also open settings drawer; when collapsing, close it
  if (uiCollapsed) {
    drawer.classList.remove('open');
  } else {
    drawer.classList.add('open');
  }
}
function toggleFurigana() {
  showFurigana = !showFurigana;
  document.body.classList.toggle('hide-furigana', !showFurigana);
  document.getElementById('btnFurigana').classList.toggle('active', showFurigana);
  saveState();
}
function toggleHira() {
  showHira = !showHira;
  document.getElementById('btnHira').classList.toggle('active', showHira);
  document.querySelectorAll('.hira-line').forEach(function(el) { el.classList.toggle('hidden', !showHira); });
  saveState();
}
function toggleTrans() {
  showTrans = !showTrans;
  document.getElementById('btnTrans').classList.toggle('active', showTrans);
  document.querySelectorAll('.trans-line').forEach(function(el) { el.classList.toggle('hidden', !showTrans); });
  saveState();
}
function setFontSize(val) {
  document.documentElement.style.setProperty('--font-size', val + 'px');
  saveState();
}

// ========== KEYBOARD / SWIPE ==========
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextPage(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevPage(); }
});

// Touch swipe
var touchStartX = 0, touchStartY = 0;
var pageEl;
function initSwipe() {
  pageEl = document.getElementById('page');
  pageEl.addEventListener('touchstart', function(e) {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
  }, {passive:true});
  pageEl.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].screenX - touchStartX;
    var dy = e.changedTouches[0].screenY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) {
      if (dx < 0) nextPage();
      else prevPage();
    }
  }, {passive:true});
}

// ========== INIT ==========
paginateSentences();
loadState();
renderPage(currentPage);
initSwipe();
