<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f3ec;--card-bg:#fffdf8;--text:#2c2416;--text-light:#6b5d4d;
  --accent:#b8433a;--border:#e0d5c5;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Source Sans Pro',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#f7f3ec,#efe8dc);
}
.card{
  background:var(--card-bg);border-radius:16px;padding:3rem 2.5rem;
  box-shadow:0 8px 32px rgba(44,36,22,0.12);border:1px solid var(--border);
  text-align:center;max-width:420px;width:90%;
}
.icon{font-size:3rem;margin-bottom:1rem;}
h1{font-family:'Noto Serif JP',serif;font-size:1.6rem;font-weight:700;margin-bottom:0.5rem;}
p{font-size:0.9rem;color:var(--text-light);margin-bottom:2rem;line-height:1.6;}
.back-link{
  font-size:0.85rem;color:var(--accent);text-decoration:none;
  font-weight:600;transition:opacity 0.2s;
}
.back-link:hover{opacity:0.7;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">&#127183;</div>
  <h1>Flashcards</h1>
  <p>Vocabulary review with spaced repetition.<br>This section is coming soon.</p>
  <a href="../index.html" class="back-link">&larr; Back to Home</a>
</div>
</body>
</html>
